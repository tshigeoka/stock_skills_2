# 取引所ナレッジ: yfinance EquityQuery 用の地域・取引所マッピング
#
# region:        yfinance EquityQuery で指定する地域コード
# region_name:   表示用の地域名（日本語）
# display_name:  スクリーニング結果ヘッダー用の表示名（KIK-514）
# aliases:       ユーザー入力からの名寄せ用エイリアス（KIK-514）
# small_cap_market_cap: 小型株時価総額閾値（現地通貨, KIK-514）
# market_class:  レガシーモード用マーケットクラス名（KIK-514）
# exchanges:     yfinance EquityQuery の exchange フィールドで利用可能な取引所コード
# currency:      主要通貨コード
# thresholds:    スクリーニングのデフォルト閾値
#   per_max:            PER 上限
#   pbr_max:            PBR 上限
#   dividend_yield_min: 配当利回り下限（比率）
#   roe_min:            ROE 下限（比率）
#   rf:                 無リスク金利（長期国債利回り目安）

regions:
  jp:
    region_name: "日本"
    display_name: "日本株"
    aliases: ["japan", "jp"]
    small_cap_market_cap: 100000000000  # 1000億円
    market_class: "JapanMarket"
    exchanges:
      - code: "JPX"
        name: "東京証券取引所（プライム・スタンダード・グロース）"
      - code: "FKA"
        name: "福岡証券取引所"
      - code: "SAP"
        name: "札幌証券取引所"
    currency: "JPY"
    ticker_suffix: ".T"
    thresholds:
      per_max: 15.0
      pbr_max: 1.0
      dividend_yield_min: 0.025
      roe_min: 0.08
      rf: 0.005

  us:
    region_name: "米国"
    display_name: "米国株"
    aliases: ["us"]
    small_cap_market_cap: 1000000000  # $1B
    market_class: "USMarket"
    exchanges:
      - code: "NMS"
        name: "NASDAQ Global Select Market"
      - code: "NYQ"
        name: "New York Stock Exchange"
      - code: "ASE"
        name: "NYSE American (旧AMEX)"
      - code: "NGM"
        name: "NASDAQ Global Market"
      - code: "NCM"
        name: "NASDAQ Capital Market"
      - code: "PCX"
        name: "NYSE Arca"
      - code: "PNK"
        name: "OTC Pink Sheets"
    currency: "USD"
    ticker_suffix: ""
    thresholds:
      per_max: 20.0
      pbr_max: 3.0
      dividend_yield_min: 0.02
      roe_min: 0.10
      rf: 0.04

  sg:
    region_name: "シンガポール"
    display_name: "シンガポール株"
    aliases: ["sg", "singapore"]
    small_cap_market_cap: 2000000000  # SGD 2B
    exchanges:
      - code: "SES"
        name: "Singapore Exchange"
    currency: "SGD"
    ticker_suffix: ".SI"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.03

  th:
    region_name: "タイ"
    display_name: "タイ株"
    aliases: ["th", "thailand"]
    small_cap_market_cap: 30000000000  # THB 30B
    exchanges:
      - code: "SET"
        name: "Stock Exchange of Thailand"
    currency: "THB"
    ticker_suffix: ".BK"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.025

  my:
    region_name: "マレーシア"
    display_name: "マレーシア株"
    aliases: ["my", "malaysia"]
    small_cap_market_cap: 5000000000  # MYR 5B
    exchanges:
      - code: "KLS"
        name: "Bursa Malaysia"
    currency: "MYR"
    ticker_suffix: ".KL"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.035

  id:
    region_name: "インドネシア"
    display_name: "インドネシア株"
    aliases: ["id", "indonesia"]
    small_cap_market_cap: 15000000000000  # IDR 15T
    exchanges:
      - code: "JKT"
        name: "Indonesia Stock Exchange (IDX)"
    currency: "IDR"
    ticker_suffix: ".JK"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.065

  ph:
    region_name: "フィリピン"
    display_name: "フィリピン株"
    aliases: ["ph", "philippines"]
    small_cap_market_cap: 50000000000  # PHP 50B
    exchanges:
      - code: "PHP"
        name: "Philippine Stock Exchange (メインボード)"
      - code: "PHS"
        name: "Philippine Stock Exchange (スモールボード)"
    currency: "PHP"
    ticker_suffix: ".PS"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.055

  # --- 将来拡張用 ---

  hk:
    region_name: "香港"
    display_name: "香港株"
    aliases: ["hk", "hongkong"]
    small_cap_market_cap: 10000000000  # HKD 10B
    exchanges:
      - code: "HKG"
        name: "Hong Kong Stock Exchange"
    currency: "HKD"
    ticker_suffix: ".HK"
    thresholds:
      per_max: 12.0
      pbr_max: 1.0
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.035

  kr:
    region_name: "韓国"
    display_name: "韓国株"
    aliases: ["kr", "korea"]
    small_cap_market_cap: 1000000000000  # KRW 1T
    exchanges:
      - code: "KSC"
        name: "Korea Exchange (KOSPI)"
      - code: "KOE"
        name: "Korea Exchange (KOSDAQ)"
    currency: "KRW"
    ticker_suffix: ".KS"
    thresholds:
      per_max: 12.0
      pbr_max: 1.0
      dividend_yield_min: 0.025
      roe_min: 0.08
      rf: 0.03

  tw:
    region_name: "台湾"
    display_name: "台湾株"
    aliases: ["tw", "taiwan"]
    small_cap_market_cap: 30000000000  # TWD 30B
    exchanges:
      - code: "TAI"
        name: "Taiwan Stock Exchange (TWSE)"
      - code: "TWO"
        name: "Taipei Exchange (TPEx)"
    currency: "TWD"
    ticker_suffix: ".TW"
    thresholds:
      per_max: 15.0
      pbr_max: 2.0
      dividend_yield_min: 0.03
      roe_min: 0.08
      rf: 0.01

  cn:
    region_name: "中国"
    display_name: "中国株"
    aliases: ["cn", "china"]
    small_cap_market_cap: 10000000000  # CNY 10B
    exchanges:
      - code: "SHH"
        name: "Shanghai Stock Exchange"
      - code: "SHZ"
        name: "Shenzhen Stock Exchange"
    currency: "CNY"
    ticker_suffix: ".SS"
    thresholds:
      per_max: 15.0
      pbr_max: 1.5
      dividend_yield_min: 0.02
      roe_min: 0.08
      rf: 0.025

# Region groups (KIK-514): multi-region aliases
region_groups:
  asean: ["sg", "th", "my", "id", "ph"]
  all: ["jp", "us", "sg", "th", "my", "id", "ph"]
