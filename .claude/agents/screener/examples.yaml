# ---------------------------------------------------------------------------
# Theme 定義（テーマごとの業種マッピング）
# テーマ指定時、該当 industries でフィルタする。
# ---------------------------------------------------------------------------
themes:
  ai:
    description: "AI・半導体"
    industries:
      - Semiconductors
      - Semiconductor Equipment & Materials
      - Software—Infrastructure
      - Electronic Components

  ev:
    description: "EV・次世代自動車"
    industries:
      - Auto Manufacturers
      - Electrical Equipment & Parts
      - Electronic Components

  cloud-saas:
    description: "クラウド・SaaS"
    industries:
      - Software—Infrastructure
      - Software—Application
      - Internet Content & Information

  cybersecurity:
    description: "サイバーセキュリティ"
    industries:
      - Software—Infrastructure
      - Internet Content & Information

  biotech:
    description: "バイオテック・創薬"
    industries:
      - Biotechnology
      - Drug Manufacturers—Specialty & Generic
      - Medical Devices

  renewable-energy:
    description: "再生可能エネルギー"
    industries:
      - Solar
      - Utilities—Renewable
      - Electrical Equipment & Parts

  fintech:
    description: "フィンテック"
    industries:
      - Credit Services
      - Software—Application
      - Banks—Regional

  defense:
    description: "防衛・航空宇宙"
    industries:
      - Aerospace & Defense
      - Specialty Industrial Machinery  # 日本の防衛大手(三菱重工・IHI・川崎重工等)

  healthcare:
    description: "ヘルスケア"
    industries:
      - Healthcare Plans
      - Medical Devices
      - Diagnostics & Research

# ---------------------------------------------------------------------------
# Preset 定義（プリセットごとのデフォルト閾値・モード）
# エージェントはこの定義を参考にしつつ、市場環境に応じて自律的に調整する。
# ---------------------------------------------------------------------------
presets:
  value:
    description: "伝統的バリュー投資（低PER・低PBR）"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_dividend_yield: 0.02
      min_roe: 0.05

  high-dividend:
    description: "高配当株（配当利回り3%以上）"
    criteria:
      min_dividend_yield: 0.03
      max_per: 20
      min_roe: 0.05

  growth:
    description: "純成長株（高ROE・高成長、割安制約なし）"
    mode: "growth"
    criteria:
      min_roe: 0.15
      min_revenue_growth: 0.05
      min_earnings_growth: 0.10
      min_market_cap: 100000000000

  growth-value:
    description: "成長バリュー（成長性＋割安度）"
    criteria:
      max_per: 20
      min_roe: 0.10
      min_revenue_growth: 0.05

  deep-value:
    description: "ディープバリュー（非常に低いPER/PBR）"
    criteria:
      max_per: 8
      max_pbr: 0.5

  quality:
    description: "クオリティバリュー（高ROE＋割安）"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_roe: 0.15
      min_dividend_yield: 0.02

  pullback:
    description: "押し目買い型（上昇トレンド中の一時調整）"
    mode: "pullback"
    criteria:
      max_per: 20
      min_roe: 0.08
      min_revenue_growth: 0.05

  alpha:
    description: "アルファシグナル（割安＋変化の質＋押し目）"
    mode: "alpha"

  trending:
    description: "Xトレンド銘柄（SNSで話題の銘柄をファンダメンタルズ評価）"
    mode: "trending"

  shareholder-return:
    description: "高還元銘柄（配当+自社株買い5%以上）"
    criteria:
      min_total_shareholder_return: 0.05
      max_per: 20
      min_roe: 0.08

  high-growth:
    description: "高成長株（利益不問・売上急成長・PSRでバブル防止）"
    criteria:
      min_revenue_growth: 0.20
      min_quarterly_revenue_growth: 0.10
      max_psr: 20.0
      min_gross_margin: 0.20

  small-cap-growth:
    description: "小型急成長株（時価総額1000億以下・売上急成長・10倍株候補）"
    criteria:
      min_revenue_growth: 0.20
      min_quarterly_revenue_growth: 0.10
      max_psr: 15.0
      min_gross_margin: 0.20
      max_market_cap: 100000000000

  contrarian:
    description: "逆張り候補（テクニカル売られすぎ × ファンダ堅調）"
    mode: "contrarian"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_roe: 0.03

  momentum:
    description: "モメンタム（急騰・ブレイクアウト検出）"
    mode: "momentum"
    criteria:
      min_52wk_change: 0.20
      min_market_cap: 50000000000

  long-term:
    description: "長期投資適性（高ROE・EPS成長・高配当・安定企業）"
    criteria:
      max_per: 25
      max_pbr: 3.0
      min_roe: 0.15
      min_dividend_yield: 0.02
      min_earnings_growth: 0.10
      min_market_cap: 100000000000

  market-darling:
    description: "市場期待銘柄（高PER許容・EPS急成長・大型）"
    criteria:
      min_per: 30
      min_earnings_growth: 0.30
      min_revenue_growth: 0.15
      max_psr: 30.0
      min_gross_margin: 0.20
      min_market_cap: 50000000000

# ---------------------------------------------------------------------------
# Few-shot Examples
# ---------------------------------------------------------------------------
examples:
  # === 割安系 ===
  - intent: "割安な日本株"
    params: { region: japan, preset: value, max_per: 15, max_pbr: 1.5, min_roe: 0.08 }
    scoring: "PER(25)+PBR(25)+配当(20)+ROE(15)+成長(15)=100点"
    reasoning: "一般的な割安基準。市場環境によって緩めても良い"

  - intent: "超割安株"
    params: { region: japan, preset: deep-value, max_per: 8, max_pbr: 0.5 }
    scoring: "PER(30)+PBR(30)+配当(20)+ROE(10)+成長(10)=100点"
    reasoning: "ディープバリュー。PER/PBR の配分を高め。流動性リスクに注意"

  # === 配当系 ===
  - intent: "米国の高配当株"
    params: { region: us, preset: high-dividend, min_dividend_yield: 0.03, min_roe: 0.10 }
    scoring: "配当(35)+PER(20)+PBR(15)+ROE(15)+成長(15)=100点"
    reasoning: "配当利回りの配分を最大化。米国の配当基準は3%以上が目安"

  - intent: "株主還元が厚い株"
    params: { region: japan, preset: shareholder-return, min_total_return: 0.05 }
    scoring: "総還元率(30)+PER(20)+PBR(15)+ROE(20)+成長(15)=100点"
    reasoning: "配当+自社株買いの総還元率で評価"

  # === 成長系 ===
  - intent: "グロース株"
    params: { region: japan, preset: growth, min_revenue_growth: 0.15, min_roe: 0.12 }
    scoring: "成長(30)+ROE(25)+PER(20)+PBR(15)+配当(10)=100点"
    reasoning: "成長率とROEの配分を高め。PER/PBR制約は緩め"

  - intent: "成長と割安のバランスが良い株"
    params: { region: japan, preset: growth-value, min_revenue_growth: 0.10, max_per: 20, min_roe: 0.10 }
    scoring: "PER(20)+PBR(20)+成長(25)+ROE(20)+配当(15)=100点"
    reasoning: "成長と割安を均等に評価。GARP（Growth At Reasonable Price）戦略"

  - intent: "爆発的に成長してる株"
    params: { region: us, preset: high-growth, min_revenue_growth: 0.20, max_psr: 20 }
    scoring: "売上成長(40)+ROE(20)+PSR(20)+マージン改善(20)=100点"
    reasoning: "売上成長率重視。赤字でも可。PSRで過大評価をフィルタ"

  - intent: "小型成長株"
    params: { region: japan, preset: small-cap-growth, min_revenue_growth: 0.20, max_psr: 15 }
    scoring: "売上成長(40)+ROE(20)+PSR(20)+マージン改善(20)=100点"
    reasoning: "テンバガー候補。時価総額1000億円以下"

  # === クオリティ系 ===
  - intent: "高品質な銘柄"
    params: { region: japan, preset: quality, min_roe: 0.15, min_revenue_growth: 0.05 }
    scoring: "ROE(35)+PER/PBR(35)+配当(20)+安定性(10)=100点"
    reasoning: "ROEと割安度の配分を最大化。安定した高収益企業"

  - intent: "長期で持てる株"
    params: { region: japan, preset: long-term, min_roe: 0.10, min_dividend_yield: 0.02 }
    scoring: "ROE(25)+PER(20)+PBR(15)+配当(25)+成長(15)=100点"
    reasoning: "配当とROEをバランス良く。5年以上のバイ&ホールド向け"

  - intent: "市場の期待株"
    params: { region: us, preset: market-darling, min_revenue_growth: 0.15, min_roe: 0.12 }
    scoring: "成長(35)+ROE(25)+PER逆配点(20)+マージン(20)=100点"
    reasoning: "高PERでも成長で正当化できる銘柄。PERは高い方がスコアUp（逆配点）"

  # === 特殊mode系 ===
  - intent: "押し目の銘柄"
    mode: pullback
    params: { region: japan, max_per: 20, min_roe: 0.08 }
    reasoning: "上昇トレンド中の一時調整を検出。RSI<40 + BB下限接近 + バウンススコア"

  - intent: "急騰銘柄"
    mode: momentum
    params: { region: japan, min_52wk_change: 0.20 }
    reasoning: "RSI/MACD/出来高/52週変化率の4軸スコア"

  - intent: "Xで話題の株"
    mode: trending
    params: { region: japan }
    reasoning: "Grok APIでX/Web上の話題銘柄を検出し、FA評価を付加"

  - intent: "逆張り候補"
    mode: contrarian
    params: { region: japan, max_per: 15, min_roe: 0.03 }
    reasoning: "テクニカル売られすぎ × ファンダ堅調。RSI<30 + BB下限割れ"

  - intent: "いい株ある？"
    mode: alpha
    params: { region: japan }
    reasoning: "4段パイプライン（割安+変化の質+押し目+2軸スコア）"

  # === テーマ × プリセット ===
  - intent: "AI関連の割安株"
    params: { region: us, preset: value, theme: ai, max_per: 25 }
    reasoning: "AIテーマはPER許容度を広げる。半導体・クラウド含む"

  - intent: "半導体の成長株"
    params: { region: us, preset: high-growth, theme: ai }
    reasoning: "半導体はaiテーマに含まれる。成長率重視で検索"

  - intent: "防衛関連で割安なやつ"
    params: { region: us, preset: value, theme: defense }
    reasoning: "defenseテーマ。航空宇宙・軍需セクター"

  - intent: "EV関連の成長バリュー"
    params: { region: japan, preset: growth-value, theme: ev }
    reasoning: "EVテーマ × 成長+割安のバランス"

  - intent: "バイオ株でクオリティ高いの"
    params: { region: us, preset: quality, theme: biotech }
    reasoning: "biotechテーマ × ROE重視のクオリティフィルタ"

  - intent: "韓国の半導体株"
    params: { region: kr, preset: value, theme: ai }
    reasoning: "半導体はaiテーマ。kr地域のPER基準はjapanより低め"

  # === 地域別閾値 ===
  - intent: "香港の高配当株"
    params: { region: hk, preset: high-dividend, min_dividend_yield: 0.04 }
    reasoning: "香港は配当利回り水準が高い。4%以上を基準に"

  - intent: "台湾のバリュー株"
    params: { region: tw, preset: value, max_per: 12, max_pbr: 1.2 }
    reasoning: "台湾はPER水準が低め。日本より厳しい基準"

  - intent: "シンガポールの高配当株"
    params: { region: sg, preset: high-dividend, min_dividend_yield: 0.04 }
    reasoning: "SGXは配当利回り水準が高め。単元100株"

  - intent: "インドネシアの成長株"
    params: { region: id, preset: growth, min_revenue_growth: 0.15 }
    reasoning: "新興国は成長率基準を高めに。流動性リスクに注意"

  - intent: "ASEAN全体で探して"
    params: { region: asean, preset: alpha }
    reasoning: "aseanは sg/th/my/id/ph の複数地域に自動展開"

  # === 市場環境コンテキスト ===
  - intent: "今の相場で何を買えばいい？（F&G 25: 恐怖）"
    params: { region: japan, preset: contrarian }
    reasoning: "恐怖指数が低い → 逆張り戦略が有効。売られすぎ銘柄を検出"

  - intent: "相場が過熱してる中で安全な株（F&G 80: 貪欲）"
    params: { region: japan, preset: quality }
    reasoning: "過熱相場 → クオリティ重視。高ROE・安定銘柄でディフェンシブ"

  - intent: "金利上昇局面で有利な株"
    params: { region: japan, preset: value, sector: "Financials" }
    reasoning: "金利上昇 → 金融セクターが恩恵。バリュー戦略と組み合わせ"

  - intent: "円安メリットの株"
    params: { region: japan, preset: growth, sector: "Technology" }
    reasoning: "円安 → 輸出・テック企業が恩恵。成長戦略で検索"

  - intent: "リセッション耐性のある株"
    params: { region: us, preset: quality, sector: "Consumer Defensive" }
    reasoning: "景気後退懸念 → ディフェンシブセクター × クオリティ"

# スコアリング配分の原則
scoring_principles:
  - preset によってスコアの配分が異なる。エージェントは preset に応じた配分を意識する
  - value系: PER/PBR の配分が高い
  - growth系: 成長率/ROE の配分が高い。PER制約は緩い
  - quality系: ROE の配分が最も高い
  - market-darling: PERは逆配点（高PER=高スコア）
  - 地域によって閾値が異なる（新興国はPER基準が低い、配当基準が高い等）

tool_responsibilities:
  - 異常値ガード（配当利回り>15%、PBR<0.1 等のサニタイズ）
  - 地域ごとの閾値調整（小型株の時価総額基準等）
  - EquityQuery ビルド・API呼び出し
