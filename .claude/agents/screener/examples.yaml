# Screener Agent — Region・Theme・Preset 定義 & Few-shot Examples
# 数値はサンプル。エージェントがユーザーの意図・市場状況に応じて自律的に調整する。

# ---------------------------------------------------------------------------
# Region 定義（地域ごとの取引所・通貨）
# yfinance EquityQuery 用。閾値はエージェントが自律判断する。
# ---------------------------------------------------------------------------
regions:
  jp:   { aliases: ["japan", "jp"],       exchanges: ["JPX"],       currency: "JPY", suffix: ".T"  }
  us:   { aliases: ["us"],                exchanges: ["NMS","NYQ","ASE","NGM","NCM","PCX"], currency: "USD", suffix: ""   }
  sg:   { aliases: ["sg", "singapore"],   exchanges: ["SES"],       currency: "SGD", suffix: ".SI" }
  th:   { aliases: ["th", "thailand"],    exchanges: ["SET"],       currency: "THB", suffix: ".BK" }
  my:   { aliases: ["my", "malaysia"],    exchanges: ["KLS"],       currency: "MYR", suffix: ".KL" }
  id:   { aliases: ["id", "indonesia"],   exchanges: ["JKT"],       currency: "IDR", suffix: ".JK" }
  ph:   { aliases: ["ph", "philippines"], exchanges: ["PHP","PHS"], currency: "PHP", suffix: ".PS" }
  hk:   { aliases: ["hk", "hongkong"],    exchanges: ["HKG"],       currency: "HKD", suffix: ".HK" }
  kr:   { aliases: ["kr", "korea"],       exchanges: ["KSC","KOE"], currency: "KRW", suffix: ".KS" }
  tw:   { aliases: ["tw", "taiwan"],      exchanges: ["TAI","TWO"], currency: "TWD", suffix: ".TW" }
  cn:   { aliases: ["cn", "china"],       exchanges: ["SHH","SHZ"], currency: "CNY", suffix: ".SS" }

region_groups:
  asean: ["sg", "th", "my", "id", "ph"]

# ---------------------------------------------------------------------------
# Theme 定義（テーマごとの業種マッピング）
# テーマ指定時、該当 industries でフィルタする。
# ---------------------------------------------------------------------------
themes:
  ai:
    description: "AI・半導体"
    industries:
      - Semiconductors
      - Semiconductor Equipment & Materials
      - Software—Infrastructure
      - Electronic Components

  ev:
    description: "EV・次世代自動車"
    industries:
      - Auto Manufacturers
      - Electrical Equipment & Parts
      - Electronic Components

  cloud-saas:
    description: "クラウド・SaaS"
    industries:
      - Software—Infrastructure
      - Software—Application
      - Internet Content & Information

  cybersecurity:
    description: "サイバーセキュリティ"
    industries:
      - Software—Infrastructure
      - Internet Content & Information

  biotech:
    description: "バイオテック・創薬"
    industries:
      - Biotechnology
      - Drug Manufacturers—Specialty & Generic
      - Medical Devices

  renewable-energy:
    description: "再生可能エネルギー"
    industries:
      - Solar
      - Utilities—Renewable
      - Electrical Equipment & Parts

  fintech:
    description: "フィンテック"
    industries:
      - Credit Services
      - Software—Application
      - Banks—Regional

  defense:
    description: "防衛・航空宇宙"
    industries:
      - Aerospace & Defense
      - Specialty Industrial Machinery  # 日本の防衛大手(三菱重工・IHI・川崎重工等)

  healthcare:
    description: "ヘルスケア"
    industries:
      - Healthcare Plans
      - Medical Devices
      - Diagnostics & Research

# ---------------------------------------------------------------------------
# Mode 定義（実行モード）
# ---------------------------------------------------------------------------
modes:
  query:       "EquityQuery による高速スクリーニング。全地域対応（デフォルト）"
  trending:    "Grok API で X/Web 上の話題銘柄を検出"
  pullback:    "テクニカル押し目判定パイプライン"
  alpha:       "4段統合スコア（割安 + 変化の質 + 押し目 + 2軸スコア）"
  contrarian:  "テクニカル売られすぎ × ファンダ堅調"
  momentum:    "RSI/MACD/出来高/52週変化率の4軸スコア"

# ---------------------------------------------------------------------------
# Preset 定義（戦略の説明とモード。数値は examples の few-shot で伝える）
# ---------------------------------------------------------------------------
presets:
  value:             "伝統的バリュー投資（低PER・低PBR）"
  high-dividend:     "高配当株（配当利回り重視）"
  growth:            { description: "純成長株（高ROE・高成長）", mode: "growth" }
  growth-value:      "成長バリュー（成長性＋割安度）"
  deep-value:        "ディープバリュー（非常に低いPER/PBR）"
  quality:           "クオリティバリュー（高ROE＋割安）"
  pullback:          { description: "押し目買い型（上昇トレンド中の一時調整）", mode: "pullback" }
  alpha:             { description: "アルファシグナル（割安＋変化の質＋押し目）", mode: "alpha" }
  trending:          { description: "Xトレンド銘柄（SNS話題＋FA評価）", mode: "trending" }
  shareholder-return: "高還元銘柄（配当+自社株買い）"
  high-growth:       "高成長株（売上急成長・PSRでバブル防止）"
  small-cap-growth:  "小型急成長株（テンバガー候補）"
  contrarian:        { description: "逆張り候補（テクニカル売られすぎ × ファンダ堅調）", mode: "contrarian" }
  momentum:          { description: "モメンタム（急騰・ブレイクアウト検出）", mode: "momentum" }
  long-term:         "長期投資適性（高ROE・配当・安定成長）"
  market-darling:    "市場期待銘柄（高PER許容・EPS急成長）"

# ---------------------------------------------------------------------------
# 3軸品質スコア閾値（KIK-710）
# score_quality() の出力を解釈する基準。エージェントが自律判断に使う。
# ---------------------------------------------------------------------------
quality_thresholds:
  levels:
    excellent: 8    # ≥8: 優秀（「高い」「優良」はこの水準）
    good: 6         # ≥6: 良好（「良い」「しっかりした」はこの水準）
    average: 4      # ≥4: 普通
    # <4 は「低い（要注意）」
  total:
    premium: 7      # ≥7: プレミアム品質
    solid: 6        # ≥6: 堅実
    moderate: 5     # ≥5: 中程度
    # <5 は「弱い」

# ---------------------------------------------------------------------------
# Few-shot Examples
# ---------------------------------------------------------------------------
examples:
  # === 割安系 ===
  - intent: "割安な日本株"
    params: { region: japan, preset: value, max_per: 15, max_pbr: 1.5, min_roe: 0.08 }
    scoring: "PER(25)+PBR(25)+配当(20)+ROE(15)+成長(15)=100点"
    reasoning: "一般的な割安基準。市場環境によって緩めても良い"

  - intent: "超割安株"
    params: { region: japan, preset: deep-value, max_per: 8, max_pbr: 0.5 }
    scoring: "PER(30)+PBR(30)+配当(20)+ROE(10)+成長(10)=100点"
    reasoning: "ディープバリュー。PER/PBR の配分を高め。流動性リスクに注意"

  # === 配当系 ===
  - intent: "米国の高配当株"
    params: { region: us, preset: high-dividend, min_dividend_yield: 0.03, min_roe: 0.10 }
    scoring: "配当(35)+PER(20)+PBR(15)+ROE(15)+成長(15)=100点"
    reasoning: "配当利回りの配分を最大化。米国の配当基準は3%以上が目安"

  - intent: "株主還元が厚い株"
    params: { region: japan, preset: shareholder-return, min_total_return: 0.05 }
    scoring: "総還元率(30)+PER(20)+PBR(15)+ROE(20)+成長(15)=100点"
    reasoning: "配当+自社株買いの総還元率で評価"

  # === 成長系 ===
  - intent: "グロース株"
    params: { region: japan, preset: growth, min_revenue_growth: 0.15, min_roe: 0.12 }
    scoring: "成長(30)+ROE(25)+PER(20)+PBR(15)+配当(10)=100点"
    reasoning: "成長率とROEの配分を高め。PER/PBR制約は緩め"

  - intent: "成長と割安のバランスが良い株"
    params: { region: japan, preset: growth-value, min_revenue_growth: 0.10, max_per: 20, min_roe: 0.10 }
    scoring: "PER(20)+PBR(20)+成長(25)+ROE(20)+配当(15)=100点"
    reasoning: "成長と割安を均等に評価。GARP（Growth At Reasonable Price）戦略"

  - intent: "爆発的に成長してる株"
    params: { region: us, preset: high-growth, min_revenue_growth: 0.20, max_psr: 20 }
    scoring: "売上成長(40)+ROE(20)+PSR(20)+マージン改善(20)=100点"
    reasoning: "売上成長率重視。赤字でも可。PSRで過大評価をフィルタ"

  - intent: "小型成長株"
    params: { region: japan, preset: small-cap-growth, min_revenue_growth: 0.20, max_psr: 15, sort_field: "revenue_growth", sort_asc: false, max_market_cap: 100000000000 }
    scoring: "売上成長(40)+ROE(20)+PSR(20)+マージン改善(20)=100点"
    quality_filter: { preset_weight: "growth", min_durability: 4 }
    reasoning: "テンバガー候補。時価総額1000億円以下。ソートは売上成長率降順（大型偏重を回避）。品質スコアはgrowth重視配分"

  - intent: "米国の小型成長株"
    params: { region: us, preset: small-cap-growth, min_revenue_growth: 0.20, max_psr: 20, sort_field: "revenue_growth", sort_asc: false, max_market_cap: 10000000000 }
    scoring: "売上成長(40)+ROE(20)+PSR(20)+マージン改善(20)=100点"
    quality_filter: { preset_weight: "growth", min_durability: 4 }
    reasoning: "米国小型株。時価総額$10B以下。PSR上限を日本より緩め"

  # === クオリティ系 ===
  - intent: "高品質な銘柄"
    params: { region: japan, preset: quality, min_roe: 0.15, min_revenue_growth: 0.05 }
    scoring: "ROE(35)+PER/PBR(35)+配当(20)+安定性(10)=100点"
    reasoning: "ROEと割安度の配分を最大化。安定した高収益企業"

  - intent: "長期で持てる株"
    params: { region: japan, preset: long-term, min_roe: 0.10, min_dividend_yield: 0.02 }
    scoring: "ROE(25)+PER(20)+PBR(15)+配当(25)+成長(15)=100点"
    reasoning: "配当とROEをバランス良く。5年以上のバイ&ホールド向け"

  - intent: "市場の期待株"
    params: { region: us, preset: market-darling, min_revenue_growth: 0.15, min_roe: 0.12 }
    scoring: "成長(35)+ROE(25)+PER逆配点(20)+マージン(20)=100点"
    reasoning: "高PERでも成長で正当化できる銘柄。PERは高い方がスコアUp（逆配点）"

  # === 特殊mode系 ===
  - intent: "押し目の銘柄"
    mode: pullback
    params: { region: japan, max_per: 20, min_roe: 0.08 }
    reasoning: "上昇トレンド中の一時調整を検出。RSI<40 + BB下限接近 + バウンススコア"

  - intent: "急騰銘柄"
    mode: momentum
    params: { region: japan, min_52wk_change: 0.20 }
    reasoning: "RSI/MACD/出来高/52週変化率の4軸スコア"

  - intent: "Xで話題の株"
    mode: trending
    params: { region: japan }
    reasoning: "Grok APIでX/Web上の話題銘柄を検出し、FA評価を付加"

  - intent: "逆張り候補"
    mode: contrarian
    params: { region: japan, max_per: 15, min_roe: 0.03 }
    reasoning: "テクニカル売られすぎ × ファンダ堅調。RSI<30 + BB下限割れ"

  - intent: "いい株ある？"
    mode: alpha
    params: { region: japan }
    reasoning: "4段パイプライン（割安+変化の質+押し目+2軸スコア）"

  # === テーマ × プリセット ===
  - intent: "AI関連の割安株"
    params: { region: us, preset: value, theme: ai, max_per: 25 }
    reasoning: "AIテーマはPER許容度を広げる。半導体・クラウド含む"

  - intent: "半導体の成長株"
    params: { region: us, preset: high-growth, theme: ai }
    reasoning: "半導体はaiテーマに含まれる。成長率重視で検索"

  - intent: "防衛関連で割安なやつ"
    params: { region: us, preset: value, theme: defense }
    reasoning: "defenseテーマ。航空宇宙・軍需セクター"

  - intent: "EV関連の成長バリュー"
    params: { region: japan, preset: growth-value, theme: ev }
    reasoning: "EVテーマ × 成長+割安のバランス"

  - intent: "バイオ株でクオリティ高いの"
    params: { region: us, preset: quality, theme: biotech }
    reasoning: "biotechテーマ × ROE重視のクオリティフィルタ"

  - intent: "韓国の半導体株"
    params: { region: kr, preset: value, theme: ai }
    reasoning: "半導体はaiテーマ。kr地域のPER基準はjapanより低め"

  # === 地域別閾値 ===
  - intent: "香港の高配当株"
    params: { region: hk, preset: high-dividend, min_dividend_yield: 0.04 }
    reasoning: "香港は配当利回り水準が高い。4%以上を基準に"

  - intent: "台湾のバリュー株"
    params: { region: tw, preset: value, max_per: 12, max_pbr: 1.2 }
    reasoning: "台湾はPER水準が低め。日本より厳しい基準"

  - intent: "シンガポールの高配当株"
    params: { region: sg, preset: high-dividend, min_dividend_yield: 0.04 }
    reasoning: "SGXは配当利回り水準が高め。単元100株"

  - intent: "インドネシアの成長株"
    params: { region: id, preset: growth, min_revenue_growth: 0.15 }
    reasoning: "新興国は成長率基準を高めに。流動性リスクに注意"

  - intent: "ASEAN全体で探して"
    params: { region: asean, preset: alpha }
    reasoning: "aseanは sg/th/my/id/ph の複数地域に自動展開"

  # === 市場環境コンテキスト ===
  - intent: "今の相場で何を買えばいい？（F&G 25: 恐怖）"
    params: { region: japan, preset: contrarian }
    reasoning: "恐怖指数が低い → 逆張り戦略が有効。売られすぎ銘柄を検出"

  - intent: "相場が過熱してる中で安全な株（F&G 80: 貪欲）"
    params: { region: japan, preset: quality }
    reasoning: "過熱相場 → クオリティ重視。高ROE・安定銘柄でディフェンシブ"

  - intent: "金利上昇局面で有利な株"
    params: { region: japan, preset: value, sector: "Financials" }
    reasoning: "金利上昇 → 金融セクターが恩恵。バリュー戦略と組み合わせ"

  - intent: "円安メリットの株"
    params: { region: japan, preset: growth, sector: "Technology" }
    reasoning: "円安 → 輸出・テック企業が恩恵。成長戦略で検索"

  - intent: "リセッション耐性のある株"
    params: { region: us, preset: quality, sector: "Consumer Defensive" }
    reasoning: "景気後退懸念 → ディフェンシブセクター × クオリティ"

  # === 無名株発見（discovery）(KIK-725) ===
  - intent: "無名な成長株を発掘して"
    mode: discovery
    params: { region: us }
    quality_filter: { preset_weight: "growth", min_durability: 4 }
    reasoning: |
      Grok API (search_market) で「急成長中の小型株」「IPO後1-2年の注目株」を検索。
      候補ティッカーを get_stock_info + get_stock_detail で定量検証。
      検証失敗（データなし/ファンダ不良）は候補除外。
      score_quality(preset_weight="growth") で3軸スコア付与。Top3を提示。
      Grok API未設定時は WebSearch にフォールバック。

  - intent: "穴場の株教えて"
    mode: discovery
    params: { region: japan }
    reasoning: "discoveryモード。日本市場で無名成長株を発掘"

  # === ETF提案 (KIK-725) ===
  - intent: "おすすめのETFは？"
    mode: etf
    params: { purpose: "auto" }
    reasoning: |
      config/etf_universe.yaml を Read して定番ETFリストを取得。
      PFの不足因子（allocation.yaml照合）に基づき、補完ETFを提案。
      get_stock_info + get_stock_detail で経費率・AUM・利回りを取得。
      purpose: auto → PF診断から自動判定。dividend/bond/sector/commodity も指定可。

  - intent: "債券ETFどれがいい？"
    mode: etf
    params: { purpose: "bond" }
    reasoning: "ヘッジ枠の補強。AGG/BND/TLT等から経費率・デュレーション・利回りで比較"

# スコアリング配分の原則
scoring_principles:
  - preset によってスコアの配分が異なる。エージェントは preset に応じた配分を意識する
  - value系: PER/PBR の配分が高い
  - growth系: 成長率/ROE の配分が高い。PER制約は緩い
  - quality系: ROE の配分が最も高い
  - market-darling: PERは逆配点（高PER=高スコア）
  - 地域によって閾値が異なる（新興国はPER基準が低い、配当基準が高い等）

tool_responsibilities:
  - 異常値ガード（配当利回り>15%、PBR<0.1 等のサニタイズ）
  - 地域ごとの閾値調整（小型株の時価総額基準等）
  - EquityQuery ビルド・API呼び出し

# ---------------------------------------------------------------------------
# 3軸品質スコア活用 Few-shot (KIK-710)
# quality_filter: score_quality()結果に対するフィルタ条件
# ---------------------------------------------------------------------------
quality_examples:
  - intent: "質の高い高配当株"
    params: { region: japan, preset: high-dividend, min_dividend_yield: 0.03, min_roe: 0.10 }
    scoring: "配当(35)+PER(20)+PBR(15)+ROE(15)+成長(15)=100点"
    quality_filter: { min_return: 6, min_durability: 6 }
    reasoning: "高配当presetで絞った後、score_quality()で還元性≥6+持続性≥6をフィルタ。見かけ高配当を排除"

  - intent: "持続性の高い成長株"
    params: { region: japan, preset: growth, min_revenue_growth: 0.10, min_roe: 0.12 }
    scoring: "成長(30)+ROE(25)+PER(20)+PBR(15)+配当(10)=100点"
    quality_filter: { min_durability: 7, min_growth: 6 }
    reasoning: "成長presetで絞った後、score_quality()で持続性≥7+成長性≥6。脆い高成長を排除"

  - intent: "バランス型の優良株"
    params: { region: japan, preset: quality, min_roe: 0.12 }
    scoring: "ROE(35)+PER/PBR(35)+配当(20)+安定性(10)=100点"
    quality_filter: { min_total: 6, min_all_axes: 4 }
    reasoning: "qualityプリセット＋3軸全て≥4かつTotal≥6。三拍子揃った銘柄"

  - intent: "堅い高配当を探して"
    params: { region: japan, preset: high-dividend, min_dividend_yield: 0.035 }
    scoring: "配当(35)+PER(20)+PBR(15)+ROE(15)+成長(15)=100点"
    quality_filter: { min_durability: 7, min_return: 6 }
    reasoning: "持続性≥7+還元性≥6で鉄壁。配当が持続可能か（payout健全性・財務堅牢性）を重視"

  - intent: "還元が厚くて成長もある株"
    params: { region: japan, preset: shareholder-return, min_total_return: 0.04 }
    scoring: "総還元率(30)+PER(20)+PBR(15)+ROE(20)+成長(15)=100点"
    quality_filter: { min_return: 6, min_growth: 5 }
    reasoning: "還元性≥6+成長性≥5。還元原資が枯渇しない持続的な還元企業を選別"

  - intent: "米国の優良成長株"
    params: { region: us, preset: growth, min_revenue_growth: 0.12, min_roe: 0.15 }
    scoring: "成長(30)+ROE(25)+PER(20)+PBR(15)+配当(10)=100点"
    quality_filter: { min_total: 7 }
    reasoning: "Total≥7のプレミアム品質のみ。米国はROE基準を高めに設定"

  - intent: "長期で安心して持てる配当株"
    params: { region: japan, preset: long-term, min_roe: 0.10, min_dividend_yield: 0.02 }
    scoring: "ROE(25)+PER(20)+PBR(15)+配当(25)+成長(15)=100点"
    quality_filter: { min_durability: 7, min_return: 5, min_growth: 4 }
    reasoning: "持続性≥7が必須。長期ホールドには財務堅牢性と事業モデル耐性が最重要"
