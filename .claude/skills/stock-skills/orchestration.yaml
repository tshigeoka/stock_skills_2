# Stock Skills Orchestration — 自律修正ループ定義
# エージェント実行後の自動リトライ・エスカレーション・ユーザー確認ルール。
# 分析・レビュー・修正は全て自律で完結。ユーザーに聞くのは最終判断のみ。

retry_rules:
  - condition: "スクリーニング結果が0件"
    action: "条件を緩めて Screener を再起動（preset → alpha, top → 20 等）"
    max_retry: 2

  - condition: "Analyst の分析に必要なデータが取れなかった"
    action: "別のツールで代替取得を試みる（yahoo_finance → WebSearch 等）"
    max_retry: 1

  # Reviewer FAIL のリトライは retry_on_fail セクションで制御（下記参照）

  - condition: "Strategist のレコメンドに矛盾がある"
    action: "Health Checker で事実を再確認してから Strategist を再起動"
    max_retry: 1

  - condition: "Grok API エラー（rate_limited / timeout）"
    action: "WebSearch ツールで代替検索"
    max_retry: 1

  - condition: "GraphRAG 未接続"
    action: "コンテキストなしで続行（graceful degradation）"
    max_retry: 0  # リトライ不要、そのまま続行

# ---------------------------------------------------------------------------
# Reviewer 起動方針 (KIK-659 / KIK-729 で再設計)
# 3分類: 自動 / アドホック / スキップ
# ---------------------------------------------------------------------------
auto_review:
  # 強制実行のみ（取り返しがつかない or 高リスク）
  trigger:
    - context: pre_trade_confirmation     # buy/sell --yes 直前
    - context: conviction_violation       # 売却提案中に conviction 銘柄が含まれる
    - context: routine_weekly_strategist  # 週次routineのstrategist出力
    - context: lesson_citation_zero       # KIK-738: lesson 引用 0 件で提案出力時
  action: append_reviewer
  skip_condition: reviewer_already_executed  # 二重実行防止

adhoc_review:
  # 出力後に [y/skip] プロンプトを出し、次ターンでユーザーが y → Reviewer起動
  trigger:
    - agent_includes: strategist          # 単発strategist
    - agent_includes: screener            # 単発screener（投資判断の入口）
    - routing_flag: "review: true"
    - output_contains: [売却, 購入, 入替, リバランス, 売るべき, 買うべき, 乗り換え, スワップ]
  action: append_review_prompt
  prompt: "🔍 Reviewerでチェック？ [y/skip]"
  user_approval_keywords: [y, yes, "レビューして", "チェックして", "review"]
  skip_when:
    - context: auto_review_already_triggered
    - context: reviewer_already_executed

skip_review:
  # 完全スキップ（事実出しのみ・連鎖なし単独）
  trigger:
    - agent_only: health-checker
    - agent_only: researcher
    - agent_only: analyst
    - agent_only: risk-assessor

# ---------------------------------------------------------------------------
# Reviewer FAIL 時のリトライ方針 (KIK-671)
# FAIL は「何を直すか」の判断にユーザーの意図が必要。自律リトライしない。
# ---------------------------------------------------------------------------
retry_on_fail:
  max_retries: 2
  before_retry: ask_user  # FAIL理由と修正方針をユーザーに提示し承認を得る
  on_pass_or_warn: auto   # PASS/WARN はユーザー確認不要でそのまま出力

# ---------------------------------------------------------------------------
# 並列実行ルール (KIK-672/673)
# サブエージェントに並列を任せても逐次実行される。
# オーケストレーター自身が複数 Agent を同時発行して強制並列化する。
# ---------------------------------------------------------------------------
parallel_execution:
  # オーケストレーター主導の並列化
  screener_split: true   # テーマ×地域ごとに独立Screenerを同時発行
  reviewer_split: true   # 3レビュアーを独立サブエージェントとして同時発行

  # エージェント間の並列化（routing.yaml で判断）
  # 連鎖: A の出力が B の入力 → 逐次
  # 並列: 独立した観点 → 同時起動

# ---------------------------------------------------------------------------
# Thesis Check（KIK-715）
# HC/Strategist完了後、対象銘柄のthesis参照を機械的に検証する。
# few-shot だけでは LLM が省略する可能性があるため、orchestration で強制する。
# ---------------------------------------------------------------------------
thesis_check:
  run_before: auto_review  # thesis_check → auto_review の順で実行
  trigger:
    - agent_includes: health-checker
    - agent_includes: strategist
  action: |
    エージェント完了後、PF銘柄の thesis を load_notes(note_type="thesis") で確認。
    1. thesis存在銘柄で出力にthesis参照がない → ⚠「thesis未参照」をユーザーに通知
    2. thesis未登録銘柄がある → ⚠「テーゼ未登録: [銘柄名]」を通知
  skip_condition: no_portfolio_context  # PF外の単発分析時はスキップ

# ---------------------------------------------------------------------------
# 定常業務（Routine Execution）(KIK-724)
# ---------------------------------------------------------------------------
routine:
  daily:
    auto_review: false       # 日次は判断を含まないためレビュー不要
    output_mode: adaptive    # 異常あり→全テーブル / 異常なし→軽量3行
    save_to: "data/session_logs/routine/daily_{date}.json"
  weekly:
    auto_review: true        # 週次は strategist を含むため自動レビュー
    skip_review_when: "strategist がスキップされた場合"
    progressive_output: true # Phase完了ごとに中間結果を出力
    save_to: "data/session_logs/routine/weekly_{date}.json"
    screener_condition: |
      ターゲット乖離red/exit-rule到達/バリュートラップ疑いがある場合に起動。
      ⚠️ screenerは情報収集。「やらないチェック」はscreener起動を阻害しない。
      「やらないチェック」該当時は結果に「📋 WL候補（買い保留）」ラベル付与。

# ---------------------------------------------------------------------------
# Output & Visibility v1 (KIK-729)
# 4レイヤ構成（ヘッダ/進捗/本体/フッタ）の適用ルール
# ---------------------------------------------------------------------------
visualization:
  layer1_header:
    always_on: true              # Pattern A含む全パターンでLayer1ヘッダを必ず出す
    source_priority:
      - routing_yaml_header      # routing.yaml の `header` フィールド優先
      - auto_generate            # なければ `[<agent>] <agent.role>` で自動生成
    format: "🎯 [<agent or chain>] <task summary>"

  layer2_progress:
    apply_when:
      - flag: "progressive: true"
      - condition: "agents.length >= 2"
      - mode_match: "routine-*"
    format: "✅ <agent_name> 完了 (X.Xs) — <1行サマリ>"

  layer3_pattern:
    selection:
      - explicit: "routing.yaml の `pattern` フィールド (A|B|C)"
      - auto_b: "agents.length == 1 (単一エージェント) → Pattern B"
      - auto_c: "agents.length >= 2 or progressive: true or mode: routine-* → Pattern C"
      - require_a_explicit: true  # Pattern A は必ず明示指定

  layer4_footer:
    order:
      - "📊 実行: <agent chain>"
      - "💾 保存: <data path>"
      - "🔍 Reviewerでチェック？ [y/skip]"  # adhoc_review対象時のみ
      - "➡ 次: <next action suggestion>"
    skippable: true  # 不要な行はスキップ可。出す場合は順序固定

escalation:
  - condition: "再試行上限に達した"
    action: "現時点の結果をそのまま提示し、制限事項を明示する"

  - condition: "複数エージェントが矛盾した結果を返した"
    action: "矛盾点を整理してユーザーに判断を委ねる"

human_in_the_loop:
  # ユーザー確認が必要な操作（それ以外は全て自律実行）
  - "売買の最終実行（buy/sell の --yes 確認）"
  - "投資判断の最終承認（Strategist のレコメンド承認）"
  - "Reviewer FAIL 時のリトライ承認（FAIL理由と修正方針を提示）"
  - "差し戻し上限到達時の続行判断"
