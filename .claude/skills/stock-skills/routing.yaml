# Stock Skills Routing — エージェント選択 few-shot
# 網羅不要。代表パターンがあれば Claude Code が柔軟に判断する。
#
# Output & Visibility v1 (KIK-729) フィールド:
#   pattern: A | B | C  (ない場合は自動判定)
#     A = ミニマル（1-3行で済む事実照会）
#     B = 標準（単一エージェント）
#     C = チェーン（連鎖 ≥2 or progressive or routine）
#   header: "🎯 [<agent or chain>] <task>" 形式の Layer1 ヘッダ
#     省略時は `[<agent>] <agent.role>` で自動生成
#
# History Check (KIK-740) フィールド:
#   history_check: true  → 投資判断時に4LLM並列で過去の歴史的類似事例を自動チェック
#     詳細は SKILL.md の "History Check" セクション参照

agents:
  screener:
    role: 銘柄探し・スクリーニング実行
    triggers: [探す, スクリーニング, いい株, おすすめ, 割安, 高配当, テーマ, トレンド, 成長株, 品質, 質の高い, クオリティ, 持続性, 還元, 堅い, 優良, 小型株, テンバガー, 穴場, 発掘, 無名, ETF, 債券ETF, セクターETF]
    required_context:
      - key: region
        optional: true
        default: japan
      - key: theme
        optional: true
  analyst:
    role: 銘柄分析・バリュエーション評価（個別株・ETF）
    triggers: [レポート, 分析, 割安度, 還元率, バリュートラップ]
    required_context:
      - key: symbol
        optional: false
  health-checker:
    role: PFの事実・数値を出す（判断・レコメンドはしない）
    triggers: [PF, ポートフォリオ, 損益, ヘルスチェック, ストレステスト, VIX, 金利, 期待リターン, 構造, 偏り, 市況チェック, おはよう, 朝サマリー, モーニング, TODO, 予定, target, 定常業務, まとめてチェック, 日次チェック, ルーティン]
    required_context: []
  researcher:
    role: ニュース・Xセンチメント・業界/市場動向・ビジネスモデル調査
    triggers: [ニュース, リサーチ, 深掘り, 業界, マーケット, 市況, センチメント, ビジネスモデル, 動向]
    required_context:
      - key: topic_or_symbol
        optional: true
        default: market_overview
  strategist:
    role: 投資判断・入替提案・ワークフロー設計・売却判断
    triggers: [入替, リバランス, 改善, 調整, プラン, 戦略, どうすべき, 乗り換え, スワップ, 売却, 損切り, 利確, 手放す, 撤退, 売るべき, 売り時]
    required_context:
      - key: target_scope
        optional: true
        default: portfolio
  risk-assessor:
    role: 市場リスク状態判定（risk-on/neutral/risk-off）+ PFバランス目標提示
    triggers: [リスク判定, リスクオン, リスクオフ, 押し目, 買われすぎ, 売られすぎ, 市況判定]
    required_context: []
  reviewer:
    role: 品質・矛盾・リスク・反論チェック（動的LLM選択）
    triggers: []  # 自動挿入: 投資判断を伴う出力時
    required_context: []

examples:
  # --- 単一エージェント (Pattern B) ---
  - intent: "いい株ある？"
    agent: screener
    pattern: B
    header: "🎯 [screener] 銘柄探し"

  - intent: "米国の高配当株を探して"
    agent: screener
    pattern: B
    header: "🎯 [screener] 米国高配当スクリーニング"

  - intent: "AI関連の割安株"
    agent: screener
    pattern: B
    header: "🎯 [screener] AI関連割安スクリーニング"

  # --- グロース枠スクリーニング（リスク判定連動・Pattern C） ---
  # risk-on → トレンドフォロー、risk-off → 割安/逆張り、neutral → 見送り
  - intent: "グロース株を探して"
    agents: [risk-assessor, screener]
    pattern: C
    header: "🎯 [risk-assessor → screener] リスク判定 → スクリーニング"
    note: "risk-assessor の判定結果を screener に渡す。normal→mode=momentum+sector_signal、risk-off→スクリーニング見送り（買わない）"

  - intent: "トヨタってどう？"
    agent: analyst
    pattern: B
    header: "🎯 [analyst] トヨタ(7203.T) 分析"

  - intent: "PF大丈夫？"
    agent: health-checker
    pattern: B
    header: "🎯 [health-checker] PFヘルスチェック"

  - intent: "ストレステストして"
    agent: health-checker
    pattern: B
    header: "🎯 [health-checker] ストレステスト"

  # --- Pattern A: ミニマル（1-3行で済む事実照会） ---
  - intent: "VIXは？"
    agent: health-checker
    pattern: A
    header: "🎯 [health-checker] VIX確認"

  - intent: "TODO見せて"
    agent: health-checker
    pattern: A
    header: "🎯 [health-checker] TODOリスト"

  - intent: "予定を確認"
    agent: health-checker
    pattern: A
    header: "🎯 [health-checker] 予定確認"

  # --- 定常業務: 日次 (KIK-724・Pattern C) ---
  - intent: "定常業務"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 日次チェック"
    note: "detect_alerts→HC(PF)→HC(市況)+researcher並列→ターゲット乖離+WLアラート。3-4分"

  - intent: "まとめてチェック"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 日次まとめチェック"

  - intent: "日次チェック"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 日次チェック"

  - intent: "ルーティン"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] ルーティン実行"

  - intent: "おはよう"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 朝サマリー"

  - intent: "朝サマリー"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 朝サマリー"

  # --- 定常業務: 週次 (KIK-724・Pattern C + 自動Reviewer) ---
  - intent: "フルチェック"
    mode: routine-weekly
    agents: [health-checker, researcher, risk-assessor, strategist, screener, reviewer]
    pattern: C
    header: "🎯 [routine-weekly] 週次フルチェック"
    review: true
    note: "日次+risk-assessor→strategist→条件付きscreener→reviewer。8-13分"

  - intent: "週次レビュー"
    mode: routine-weekly
    agents: [health-checker, researcher, risk-assessor, strategist, screener, reviewer]
    pattern: C
    header: "🎯 [routine-weekly] 週次レビュー"
    review: true

  - intent: "しっかり見たい"
    mode: routine-weekly
    agents: [health-checker, researcher, risk-assessor, strategist, screener, reviewer]
    pattern: C
    header: "🎯 [routine-weekly] 週次レビュー"
    review: true

  - intent: "最新ニュース教えて"
    agent: researcher
    pattern: B
    header: "🎯 [researcher] 最新ニュース"

  - intent: "半導体業界を調べて"
    agent: researcher
    pattern: B
    header: "🎯 [researcher] 半導体業界リサーチ"

  - intent: "入替提案して"
    agent: strategist
    pattern: B
    header: "🎯 [strategist] 入替提案"
    review: true
    history_check: true

  - intent: "プランモードで"
    agents: [health-checker, analyst, researcher, strategist]
    pattern: C
    header: "🎯 [HC → analyst → researcher → strategist] PF確認 → 分析 → リサーチ → 戦略立案"
    progressive: true
    review: true
    history_check: true

  # --- 複数エージェント連鎖 (Pattern C) ---
  - intent: "今熱いテーマは？"
    agents: [researcher, screener]
    pattern: C
    header: "🎯 [researcher → screener] テーマリサーチ → スクリーニング"

  - intent: "リスク判定して"
    agent: risk-assessor
    pattern: B
    header: "🎯 [risk-assessor] リスク判定"

  - intent: "今はリスクオン？"
    agent: risk-assessor
    pattern: A
    header: "🎯 [risk-assessor] リスク状態確認"

  - intent: "押し目買いの判定"
    agent: risk-assessor
    pattern: B
    header: "🎯 [risk-assessor] 押し目買い判定"

  - intent: "市況チェック"
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [HC + researcher] 市況定量 + ニュース"

  - intent: "PFを改善したい"
    agents: [health-checker, strategist]
    pattern: C
    header: "🎯 [HC → strategist] PF数値確認 → 改善提案"
    review: true
    history_check: true

  # --- 売却判断（risk-assessor → health-checker → strategist の3連鎖） ---
  - intent: "この株売るべき？"
    agents: [risk-assessor, health-checker, strategist]
    pattern: C
    header: "🎯 [risk → HC → strategist] リスク判定 → 数値確認 → 売却判断"
    progressive: true
    review: true
    history_check: true
    note: "risk-assessorで市場リスク判定→health-checkerで数値事実→strategistでcheck_exit_rule照合+What-If比較"

  - intent: "損切りすべき？"
    agents: [risk-assessor, health-checker, strategist]
    pattern: C
    header: "🎯 [risk → HC → strategist] リスク判定 → 数値確認 → 損切り判断"
    progressive: true
    review: true
    history_check: true

  - intent: "利確すべき？"
    agents: [risk-assessor, health-checker, strategist]
    pattern: C
    header: "🎯 [risk → HC → strategist] リスク判定 → 数値確認 → 利確判断"
    progressive: true
    review: true
    history_check: true

  - intent: "リスク確認して代わりを探して"
    agents: [health-checker, screener]
    pattern: C
    header: "🎯 [HC → screener] リスク確認 → 代替候補探索"
    review: true
    history_check: true

  - intent: "半導体を調べて有望な銘柄を探して"
    agents: [researcher, screener]
    pattern: C
    header: "🎯 [researcher → screener] 業界リサーチ → 銘柄探索"

  - intent: "トヨタを調べてメモして"
    agent: analyst
    pattern: B
    header: "🎯 [analyst] トヨタ調査+メモ"

  # --- 記録系（エージェント不要、オーケストレーターが直接実行・Pattern A） ---
  - intent: "メモして"
    action: direct
    operation: note_save
    pattern: A
    header: "🎯 [direct] メモ保存"

  - intent: "学びを記録"
    action: direct
    operation: note_save
    pattern: A
    header: "🎯 [direct] 学び記録"

  - intent: "テーゼを記録"
    action: direct
    operation: note_save
    pattern: A
    header: "🎯 [direct] テーゼ記録"

  - intent: "ウォッチリストに入れて"
    action: direct
    operation: watchlist_add
    pattern: A
    header: "🎯 [direct] ウォッチリスト追加"

  - intent: "ウォッチリスト見せて"
    action: direct
    operation: watchlist_list
    pattern: A
    header: "🎯 [direct] ウォッチリスト表示"

  - intent: "ウォッチリストから外して"
    action: direct
    operation: watchlist_remove
    pattern: A
    header: "🎯 [direct] ウォッチリスト削除"

  - intent: "トヨタ100株買った"
    action: direct
    operation: portfolio_buy
    pattern: A
    header: "🎯 [direct] PF購入記録"

  - intent: "AAPL5株売った"
    action: direct
    operation: portfolio_sell
    pattern: A
    header: "🎯 [direct] PF売却記録"

  - intent: "メモ一覧"
    action: direct
    operation: note_list
    pattern: A
    header: "🎯 [direct] メモ一覧"

  - intent: "メモ削除"
    action: direct
    operation: note_delete
    pattern: A
    header: "🎯 [direct] メモ削除"

  - intent: "現金は○○円"
    action: direct
    operation: cash_update
    pattern: A
    header: "🎯 [direct] 現金残高更新"

  - intent: "キャッシュ残高"
    action: direct
    operation: cash_update
    pattern: A
    header: "🎯 [direct] キャッシュ残高表示"

  - intent: "ドルは$○○"
    action: direct
    operation: cash_update
    pattern: A
    header: "🎯 [direct] USD残高更新"

  - intent: "syncして"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] GraphRAG同期"

  - intent: "データを同期して"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] データ同期"

  - intent: "GraphRAGと同期"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] GraphRAG同期"

  - intent: "データの整合性チェック"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] 整合性チェック"

context_rules:
  - 直前の銘柄を省略されたら補完する
  - 直前のスクリーニング結果の「N位の銘柄」は自動解決する
  - 直前のhealth結果の注意銘柄（RSI異常値・大幅損失等）は自動引き継ぐ

ambiguity:
  strategy: ask  # 複数エージェントが同スコアなら短く選択肢を提示
