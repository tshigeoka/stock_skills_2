# DeepThink ハーネス制約 — 暴走防止
# 評価→改善ループが無限に続くことを防ぐ安全装置。

limits:
  max_iterations: 5          # 評価→改善ループの最大回数
  max_agent_spawns: 10       # サブエージェント起動の最大数
  max_llm_calls: 20          # 外部LLM (GPT/Gemini/Grok) の最大呼び出し回数
  max_wall_time_minutes: 15  # 壁時計時間の上限

# 深度プリセット
depth_presets:
  shallow:
    max_iterations: 1
    max_agent_spawns: 3
    max_llm_calls: 5
    description: "1回の追加調査。軽量な補完"
  medium:
    max_iterations: 3
    max_agent_spawns: 6
    max_llm_calls: 12
    description: "2-3回の評価→改善ループ。標準的な深掘り"
  deep:
    max_iterations: 5
    max_agent_spawns: 10
    max_llm_calls: 20
    description: "収束するまでループ。徹底的な分析"

actions:
  on_limit_reached:
    - "現時点の中間結果をユーザーに提示"
    - "続行にはユーザーの明示的な承認が必要"
    - "承認なしで自動延長しない"
