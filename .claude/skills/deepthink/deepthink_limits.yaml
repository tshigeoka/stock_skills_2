# DeepThink ハーネス制約 — 暴走防止
# 評価→改善ループが無限に続くことを防ぐ安全装置。

limits:
  max_iterations: 5          # 評価→改善ループの最大回数
  max_agent_spawns: 20       # サブエージェント起動の最大数（全ステップ累計）
  max_llm_calls: 25          # 外部LLM (GPT/Gemini/Grok) の最大呼び出し回数
  max_wall_time_minutes: 15  # 壁時計時間の上限

# 深度プリセット (KIK-690: max_output_chars 追加)
depth_presets:
  shallow:
    max_iterations: 1
    max_agent_spawns: 6
    max_llm_calls: 8
    max_output_chars: 1500   # 各エージェント出力の推奨上限
    description: "1回の4-Swarmレビュー。軽量な補完"
  medium:
    max_iterations: 3
    max_agent_spawns: 12
    max_llm_calls: 16
    max_output_chars: 2500
    description: "2-3回の評価→改善ループ。標準的な深掘り"
  deep:
    max_iterations: 5
    max_agent_spawns: 20
    max_llm_calls: 25
    max_output_chars: 4000
    description: "収束するまでループ。徹底的な分析"

actions:
  on_limit_reached:
    - "現時点の中間結果をユーザーに提示"
    - "続行にはユーザーの明示的な承認が必要"
    - "承認なしで自動延長しない"

# KIK-731 / KIK-732: 外部リサーチツール上限（コスト保証）
# 月予算 $50 で安全に収まるよう設計
tool_limits:
  gemini_deep_research:
    max_calls_per_session: 2          # 1セッション最大2回
    max_calls_per_month: 10           # 月10回まで（$2.5×10=$25）
    monthly_budget_usd: 30
    estimated_cost_usd:
      light: 1.5
      medium: 2.5
      heavy: 5.0
    wall_time_per_call_sec: 1800      # 30 min ハードキャンセル
    kill_switch_env: DEEPTHINK_DR_ENABLED  # =off で実行停止
    log_path: data/logs/deepthink_meta.jsonl
  grok_bulk_x_search:
    max_calls_per_session: 5
    max_calls_per_month: 20
    monthly_budget_usd: 10
    cost_per_call_usd: 0.5
    log_path: data/logs/deepthink_meta.jsonl
  grok_bulk_web_search:
    max_calls_per_session: 3
    max_calls_per_month: 15
    monthly_budget_usd: 7.5
    cost_per_call_usd: 0.5
    log_path: data/logs/deepthink_meta.jsonl

# 月次合算上限（Hard cap）
monthly_total_budget_usd: 50
